version: "3.8"

services:
  app:
    build:
      context: .
      args:
        # 自动读取.env里的BUILD_FRONTEND，无则默认false
        BUILD_FRONTEND: ${BUILD_FRONTEND:-false}
    container_name: pool-gateway
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - PORT
      - JWT_SECRET
      - ADMIN_USERNAME
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - MONGO_URI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo
    # 临时挂载：容器构建好后，把打包的public输出到宿主机
    volumes:
      - ./public:/app/dist-output
    # 容器启动时自动把内置public复制到挂载目录，覆盖宿主机文件
    command: sh -c "cp -rf /app/public/* /app/dist-output/ && node server.js"

  mongo:
    image: mongo:7
    container_name: pool-mongo
    restart: unless-stopped
    volumes:
      - ./mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pool-gateway

  nginx:
    image: nginx:alpine
    container_name: pool-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # 依旧挂载本地public，现在会是最新编译产物
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - app