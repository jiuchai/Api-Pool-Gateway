version: "3.8"

services:
  app:
    build:
      context: .
      args:
        BUILD_FRONTEND: ${BUILD_FRONTEND:-false}
    container_name: pool-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:${PORT:-3002}"
    environment:
      - PORT
      - JWT_SECRET
      - ADMIN_USERNAME
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
