version: "3.8"

services:
  app:
    build:
      context: .
      args:
        BUILD_FRONTEND: ${BUILD_FRONTEND:-false}
    container_name: pool-gateway
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - PORT
      - JWT_SECRET
      - ADMIN_USERNAME
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - MONGO_URI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: pool-mongo
    restart: unless-stopped
    volumes:
      - ./mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pool-gateway

  nginx:
    image: nginx:alpine
    container_name: pool-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - app
